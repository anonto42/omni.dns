services:
  # ── Go backend with Air hot-reload ─────────────────────────────────────────
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: dev
    image: dns-server:dev
    container_name: dns-server-dev
    ports:
      - "5354:5353/udp"   # DNS (5354 on host → 5353 in container; avoids conflict with adb on 5353)
      - "8080:8080"       # HTTP dashboard / API
    volumes:
      - ../backend:/app           # live source mount — Air watches this
      - go-pkg-cache:/go/pkg      # cache compiled packages across restarts
    environment:
      CGO_ENABLED: "1"
      GOWORK: "off"
      OMNIDNS_ADMIN_EMAIL: "admin@omnidns.local"
      OMNIDNS_ADMIN_PASSWORD: "change-me-in-dev"
    # Pass all config as CLI flags so the binary doesn't need env-var parsing
    command: >
      air -c .air.toml
      --
      --dns-port  5353
      --http-port 8080
      --db        /app/data/dns.db
      --log-level debug

  # ── React frontend with Vite HMR ───────────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - npm-cache:/root/.npm      # cache npm downloads across restarts
    ports:
      - "5173:5173"
    # VITE_API_HOST tells vite.config.ts which host to proxy /api to
    environment:
      VITE_API_HOST: "http://backend:8080"
    # Install deps if node_modules is missing, then start dev server
    entrypoint: ["/bin/sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - backend

volumes:
  go-pkg-cache:
  npm-cache:
