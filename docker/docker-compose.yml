services:
  dns-server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: production
    image: dns-server:latest
    container_name: dns-server
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - dns-data:/app/data
    environment:
      OMNIDNS_DNS_ADDR: ${OMNIDNS_DNS_ADDR:-}
      OMNIDNS_DNS_PORT: ${OMNIDNS_DNS_PORT:-53}
      OMNIDNS_HTTP_PORT: ${OMNIDNS_HTTP_PORT:-8080}
      OMNIDNS_UPSTREAM: ${OMNIDNS_UPSTREAM:-1.1.1.1:853}
      OMNIDNS_UPSTREAM_TLS: ${OMNIDNS_UPSTREAM_TLS:-true}
      OMNIDNS_DB_PATH: ${OMNIDNS_DB_PATH:-data/dns.db}
      OMNIDNS_LOG_LEVEL: ${OMNIDNS_LOG_LEVEL:-info}
      OMNIDNS_ADMIN_EMAIL: ${OMNIDNS_ADMIN_EMAIL:-admin@omnidns.local}
      OMNIDNS_ADMIN_PASSWORD: ${OMNIDNS_ADMIN_PASSWORD:?Set OMNIDNS_ADMIN_PASSWORD before starting OmniDNS}

volumes:
  dns-data:
