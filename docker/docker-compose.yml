services:
  dns-server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: production
    image: dns-server:latest
    container_name: dns-server
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - dns-data:/app/data
    # All config is via CLI flags — no env vars needed
    # Override individual flags here if needed, e.g.:
    #   command: ["./dns-server", "--upstream", "9.9.9.9:53", "--log-prune", "168h"]

volumes:
  dns-data:
