repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: generate-types
        name: Sync Go → TypeScript types
        entry: bash -c 'make generate && git diff --exit-code frontend/apps/web-app/src/features/api-types.ts'
        language: system
        files: ^backend/internal/.*\.go$
        pass_filenames: false

      - id: lint-backend
        name: Lint Go code
        entry: bash -c 'cd backend && golangci-lint run ./...'
        language: system
        files: ^backend/.*\.go$
        pass_filenames: false

      - id: lint-frontend
        name: Lint TypeScript/React
        entry: bash -c 'cd frontend/apps/web-app && npm run lint'
        language: system
        files: ^frontend/apps/web-app/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: test-backend
        name: Run Go tests
        entry: bash -c 'cd backend && go test ./...'
        language: system
        files: ^backend/.*\.go$
        pass_filenames: false
