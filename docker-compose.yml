version: "3.9"

services:
  dns-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: dns-server:latest
    container_name: dns-server
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=UTC
    volumes:
      - dns-data:/app/data
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:8080"

volumes:
  dns-data:
