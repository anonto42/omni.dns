run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - goimports
    - revive
    - gosimple
    - ineffassign
    - unused
    - misspell
  disable:
    - wsl
    - exhaustruct

linters-settings:
  goimports:
    local-prefixes: github.com/sohidul/esp32-dns-server
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
